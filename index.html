<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AMK Travels India — ERP (Live App)</title>
<style>
:root{--brand:#6d1a2d;--brand2:#9b2742;--gold:#c8a24b;--bg:#f5f1ea;--ink:#211d24;--muted:#6f6a74;--line:#e3dccf;--card:#fff;--ok:#1f9d63;--okbg:#e7f6ee;--warn:#d9852a;--warnbg:#fbefdd;--danger:#c0392b;--dangerbg:#fbe7e4;--info:#2f6fb0;--infobg:#e6f0fa}
*{box-sizing:border-box}html,body{margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.45}
button{font-family:inherit}
#login{position:fixed;inset:0;background:linear-gradient(135deg,#5c1525,#7d2236);display:flex;align-items:center;justify-content:center;z-index:50}
#login .box{background:#fff;border-radius:18px;padding:30px;width:350px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.3)}
#login .logo{width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,var(--gold),#e3c578);display:grid;place-items:center;color:#5c1525;font-weight:800;font-size:20px;margin:0 auto 14px}
#login h1{font-size:18px;text-align:center;margin:0 0 4px}#login p{text-align:center;color:var(--muted);font-size:12.5px;margin:0 0 18px}
.inp{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:14px;margin-bottom:10px;outline:none}
.inp:focus{border-color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:0;border-radius:10px;padding:10px 14px;font-weight:700;font-size:13px;cursor:pointer;background:var(--brand);color:#fff}
.btn:hover{background:var(--brand2)}.btn.gold{background:linear-gradient(135deg,#caa24c,#b88a2f);color:#3a2407}
.btn.ghost{background:#fff;color:var(--ink);border:1px solid var(--line)}.btn.sm{padding:6px 10px;font-size:12px;border-radius:8px}
.btn.danger{background:var(--danger)}.btn.full{width:100%}.btn.wa{background:#25d366;color:#06351f}
#app{display:none;grid-template-columns:222px 1fr;min-height:100vh}
.side{background:linear-gradient(180deg,#5c1525,#6d1a2d 60%,#7d2236);color:#f3e9df;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{display:flex;align-items:center;gap:10px;padding:16px 16px 12px}
.brand .lg{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#e3c578);display:grid;place-items:center;color:#5c1525;font-weight:800}
.brand b{font-size:14px;display:block;line-height:1}.brand small{color:#e8c98f;font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase}
.nav{padding:6px 8px;overflow:auto;flex:1}
.nav a{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;color:#f0e2d6;font-weight:600;cursor:pointer;border-left:3px solid transparent;font-size:13px;margin:1px 0}
.nav a:hover{background:rgba(255,255,255,.08)}.nav a.active{background:rgba(255,255,255,.13);border-left-color:var(--gold);color:#fff}
.nav .ico{width:18px;text-align:center}
.side .who{padding:10px 14px;border-top:1px solid rgba(255,255,255,.12);font-size:11px;color:#e9cfa6}
.main{min-width:0;display:flex;flex-direction:column}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.95);backdrop-filter:blur(6px);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:11px 20px}
.top h2{margin:0;font-size:16px}.top .sp{flex:1}
.wrap{padding:20px;max-width:1150px;width:100%}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(20,10,10,.05),0 8px 22px rgba(20,10,10,.05)}
.kpi .l{color:var(--muted);font-size:12px;font-weight:600}.kpi .v{font-size:24px;font-weight:800;margin-top:6px;letter-spacing:-.5px}
h3.sec{font-size:14px;margin:22px 2px 10px}
table{width:100%;border-collapse:collapse;font-size:12.8px;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
th{text-align:left;color:var(--muted);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;padding:9px 10px;border-bottom:1px solid var(--line);background:#faf6ef}
td{padding:9px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
tr:last-child td{border-bottom:0}tbody tr:hover{background:#fbf8f3}
.tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:30px}
.t-ok{background:var(--okbg);color:var(--ok)}.t-warn{background:var(--warnbg);color:var(--warn)}.t-info{background:var(--infobg);color:var(--info)}.t-mut{background:#eee9e1;color:#7a7468}.t-danger{background:var(--dangerbg);color:var(--danger)}
.rowflex{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.muted{color:var(--muted)}.right{text-align:right}.up{color:var(--ok)}.down{color:var(--danger)}
.linkbtn{color:var(--brand);font-weight:700;cursor:pointer;background:none;border:0;font-size:12px}
.modal{position:fixed;inset:0;background:rgba(20,10,12,.45);display:none;align-items:flex-start;justify-content:center;z-index:40;padding:30px 14px;overflow:auto}
.modal.open{display:flex}
.sheet{background:#fff;border-radius:16px;width:600px;max-width:96vw;padding:22px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
.sheet h3{margin:0 0 14px;font-size:16px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.f{display:flex;flex-direction:column;gap:4px}.f.wide{grid-column:1/-1}
.f label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.f input,.f select,.f textarea{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit}
.f input:focus,.f select:focus{border-color:var(--gold)}
.modal .actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;flex-wrap:wrap}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-weight:600;font-size:13px;opacity:0;transition:.3s;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{padding:26px;text-align:center;color:var(--muted);font-size:13px;background:#fff;border:1px dashed var(--line);border-radius:12px}
.itemrow{display:grid;grid-template-columns:1.4fr .7fr 1.4fr 1.4fr 1.4fr auto;gap:8px;margin-bottom:8px}
.itemrow input{border:1px solid var(--line);border-radius:8px;padding:7px 9px;font-size:12.5px}
#print{display:none}
@media print{body *{visibility:hidden}#print,#print *{visibility:visible}#print{display:block;position:absolute;inset:0;padding:0}}
.doc{max-width:760px;margin:0 auto;color:#000;font-size:13px}
.doc .hd{display:flex;justify-content:space-between;border-bottom:3px solid var(--brand);padding-bottom:12px;margin-bottom:14px}
.doc h1{color:var(--brand);font-size:22px;margin:0}
.doc table{border:1px solid #999}.doc th{background:#f0e7ea;color:#000;border-bottom:1px solid #999}.doc td{border-bottom:1px solid #ccc}
.doc .tot{margin-left:auto;width:300px;margin-top:10px}.doc .tot div{display:flex;justify-content:space-between;padding:4px 0}
@media(max-width:760px){#app{grid-template-columns:1fr}.side{display:none}.fg{grid-template-columns:1fr}.itemrow{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div class="logo">AMK</div>
    <h1>AMK Travels India — ERP</h1>
    <p>Login with your mobile number &amp; password</p>
    <input id="lmobile" class="inp" placeholder="Mobile number" inputmode="numeric"/>
    <input id="lpass" class="inp" type="password" placeholder="Password"/>
    <button class="btn gold full" onclick="doLogin()">Login</button>
    <p style="margin-top:14px;font-size:11px">Admin first login: <b>9251966666 / 9251966666</b><br>Add your team (Operations, Accounts, Sales) under Team &amp; Users.</p>
  </div>
</div>

<div id="app">
  <aside class="side">
    <div class="brand"><div class="lg">AMK</div><div><b>AMK Travels</b><small>India · ERP</small></div></div>
    <nav class="nav" id="nav"></nav>
    <div class="who" id="who"></div>
  </aside>
  <div class="main">
    <header class="top"><h2 id="title">Dashboard</h2><div class="sp"></div>
      <button class="btn sm gold" id="addBtn" onclick="addCurrent()">+ Add</button>
      <button class="btn sm ghost" onclick="logout()">Logout</button>
    </header>
    <div class="wrap" id="view"></div>
  </div>
</div>

<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<div id="print"></div>

<script>
"use strict";
var KEY="amk_db_v1", SESS="amk_user_v1", CITIES=["Jaipur","Udaipur","Jodhpur","Ranthambore"], TCITY=["All","Jaipur","Udaipur","Jodhpur","Ranthambore"];
var ROLES=["Admin","Operations","Accounts","Sales"];
var BTYPE=["Group","Inbound (P2P)","Recce","Local full-day","Airport transfer"];

var ENT={
 bookings:{label:"Bookings",sing:"Booking",fields:[
   {n:"ref",l:"Booking ref",t:"text"},{n:"client",l:"Client / company",t:"text",req:1},
   {n:"type",l:"Type",t:"sel",o:BTYPE},{n:"event",l:"Event / movement",t:"text"},
   {n:"city",l:"City",t:"sel",o:CITIES},{n:"from",l:"From date",t:"date"},{n:"to",l:"To date",t:"date"},
   {n:"hotel",l:"Hotel / venue",t:"text"},{n:"pax",l:"Passengers",t:"num"},
   {n:"status",l:"Status",t:"sel",o:["Estimate","Confirmed","Closed"]}],
   cols:[["ref","Ref"],["client","Client"],["type","Type"],["city","City"],["from","From"],["status","Status"]]},
 itineraries:{label:"Itineraries",sing:"Itinerary"},
 movements:{label:"Allocation / Movements",sing:"Movement",fields:[
   {n:"booking",l:"Booking ref",t:"text"},{n:"type",l:"Type",t:"sel",o:BTYPE},
   {n:"guest",l:"Guest / group",t:"text",req:1},{n:"pax",l:"Pax",t:"num"},{n:"date",l:"Date",t:"date"},
   {n:"pickup",l:"Pick-up",t:"text"},{n:"drop",l:"Drop",t:"text"},
   {n:"car",l:"Car",t:"text"},{n:"driver",l:"Driver / chauffeur",t:"text"},{n:"driverMobile",l:"Driver mobile",t:"text"},
   {n:"status",l:"Status",t:"sel",o:["Scheduled","Assigned","En route","Completed"]}],
   cols:[["date","Date"],["guest","Guest"],["type","Type"],["pickup","Pick-up"],["drop","Drop"],["car","Car"],["status","Status"]]},
 vendors:{label:"Vendor Work Orders",sing:"Vendor WO",fields:[
   {n:"wo",l:"WO ref",t:"text"},{n:"vendor",l:"Vendor",t:"text",req:1},{n:"contact",l:"Contact person",t:"text"},
   {n:"mobile",l:"Mobile",t:"text"},{n:"gstin",l:"GSTIN / PAN",t:"text"},{n:"booking",l:"For booking ref",t:"text"},
   {n:"vehicles",l:"Vehicles",t:"text"},{n:"amount",l:"Payout amount",t:"num"},
   {n:"status",l:"Status",t:"sel",o:["Issued","Confirmed","Completed"]}],
   cols:[["wo","WO"],["vendor","Vendor"],["vehicles","Vehicles"],["amount","Payout"],["status","Status"]]},
 duty:{label:"Duty Slips",sing:"Duty Slip",fields:[
   {n:"date",l:"Date",t:"date"},{n:"booking",l:"Booking / group ref",t:"text"},
   {n:"slip",l:"Slip type",t:"sel",o:["Regular","Start of group","End of group","Recce"]},
   {n:"car",l:"Car",t:"text"},{n:"driver",l:"Driver",t:"text"},
   {n:"hours",l:"Hours",t:"num"},{n:"km",l:"Km",t:"num"},{n:"toll",l:"Toll",t:"num"},{n:"parking",l:"Parking",t:"num"},
   {n:"status",l:"Status",t:"sel",o:["Open","Closed"]}],
   cols:[["date","Date"],["booking","Group"],["slip","Slip"],["car","Car"],["driver","Driver"],["hours","Hrs"],["status","Status"]]},
 recce:{label:"Recce Vehicles",sing:"Recce vehicle",fields:[
   {n:"client",l:"Client / account",t:"text",req:1},{n:"date",l:"Date given",t:"date"},
   {n:"vehicle",l:"Vehicle",t:"text"},{n:"days",l:"Days / usage",t:"num"},{n:"cost",l:"Cost",t:"num"},
   {n:"purpose",l:"Purpose / notes",t:"text"},{n:"status",l:"Status",t:"sel",o:["Open","Billed"]}],
   cols:[["date","Date"],["client","Client"],["vehicle","Vehicle"],["cost","Cost"],["status","Status"]]},
 ledger:{label:"Cash Flow",sing:"Entry",fields:[
   {n:"date",l:"Date",t:"date"},{n:"type",l:"Type",t:"sel",o:["IN","OUT"]},{n:"head",l:"Description / head",t:"text",req:1},
   {n:"mode",l:"Mode",t:"sel",o:["Cash","Cheque","UPI","Bank"]},{n:"city",l:"City",t:"sel",o:CITIES},{n:"amount",l:"Amount",t:"num"}],
   cols:[["date","Date"],["type","Type"],["head","Head"],["mode","Mode"],["city","City"],["amount","Amount"]]},
 clients:{label:"Clients",sing:"Client",fields:[
   {n:"name",l:"Company / client",t:"text",req:1},{n:"contact",l:"Contact person",t:"text"},{n:"mobile",l:"Mobile",t:"text"},
   {n:"email",l:"Email",t:"text"},{n:"gstin",l:"GSTIN / PAN",t:"text"},{n:"city",l:"City",t:"sel",o:CITIES}],
   cols:[["name","Client"],["contact","Contact"],["mobile","Mobile"],["city","City"]]},
 users:{label:"Team & Users",sing:"Team member",fields:[
   {n:"name",l:"Name",t:"text",req:1},{n:"mobile",l:"Mobile (login)",t:"text",req:1},{n:"password",l:"Password",t:"text",req:1},
   {n:"role",l:"Role",t:"sel",o:ROLES},{n:"city",l:"City",t:"sel",o:TCITY}],
   cols:[["name","Name"],["mobile","Mobile"],["role","Role"],["city","City"]]}
};
var NAV=[["dash","Dashboard","▤"],["bookings","Bookings","\u{1F4C5}"],["itineraries","Itineraries","\u{1F9ED}"],
 ["movements","Allocation","\u{1F697}"],["vendors","Vendor WO","\u{1F4CB}"],["duty","Duty Slips","\u{1F9FE}"],
 ["recce","Recce Vehicles","\u{1F50E}"],["invoices","Invoices (GST)","₹"],["ledger","Cash Flow","\u{1F4B0}"],
 ["clients","Clients","\u{1F464}"],["users","Team & Users","\u{1F465}"],["settings","Settings","⚙"]];
var ACCESS={
 Admin:["dash","bookings","itineraries","movements","vendors","duty","recce","invoices","ledger","clients","users","settings"],
 Operations:["dash","bookings","itineraries","movements","vendors","duty","recce","settings"],
 Accounts:["dash","bookings","recce","invoices","ledger","clients","settings"],
 Sales:["dash","clients","bookings","itineraries","settings"]
};

function todayISO(){var d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function seed(){var t=todayISO();return {
 _seq:{users:4,clients:1,bookings:2,vendors:1,movements:1,duty:1,ledger:1,invoices:0,recce:1,itineraries:1},
 users:[
  {id:1,name:"Admin (Anant)",mobile:"9251966666",password:"9251966666",role:"Admin",city:"All"},
  {id:2,name:"Operations",mobile:"9829018862",password:"9829018862",role:"Operations",city:"Jaipur"},
  {id:3,name:"Sales",mobile:"9829143903",password:"9829143903",role:"Sales",city:"Jaipur"},
  {id:4,name:"Accounts",mobile:"9251966667",password:"9251966667",role:"Accounts",city:"All"}],
 clients:[{id:1,name:"Yolo Entertainment",contact:"Pratik Hemdev",mobile:"9820424953",email:"pratik@yoloent.in",gstin:"",city:"Jaipur"}],
 bookings:[
  {id:1,ref:"AMK/2026/0013",client:"Yolo Entertainment",type:"Group",event:"Innova & Urbania movement",city:"Jaipur",from:t,to:"2026-07-02",hotel:"Hyatt Regency Mansarovar",pax:150,status:"Confirmed"},
  {id:2,ref:"AMK/2026/0021",client:"Dell",type:"Inbound (P2P)",event:"Corporate inbound 1-2 cars",city:"Udaipur",from:t,to:t,hotel:"Leela Palace",pax:6,status:"Confirmed"}],
 vendors:[{id:1,wo:"AMK/VENDOR/2026/009",vendor:"BBR Services",contact:"Ramesh Meena",mobile:"9785555733",gstin:"08BPHPM2353H1ZU",booking:"AMK/2026/0013",vehicles:"Innova Crysta & Urbania",amount:60000,status:"Issued"}],
 movements:[{id:1,booking:"AMK/2026/0013",type:"Group",guest:"Rohan Agarwal +12",pax:13,date:t,pickup:"Jaipur Airport T2",drop:"Hyatt Regency",car:"Innova Crysta",driver:"Ram Singh",driverMobile:"9900000012",status:"Assigned"}],
 duty:[{id:1,date:t,booking:"AMK/2026/0021",slip:"Start of group",car:"Innova Crysta",driver:"Ram Singh",hours:0,km:0,toll:0,parking:0,status:"Open"}],
 ledger:[{id:1,date:t,type:"IN",head:"Booking advance - Yolo Entertainment",mode:"Cheque",city:"Jaipur",amount:50000}],
 invoices:[],
 recce:[{id:1,client:"Yolo Entertainment",date:"2026-04-12",vehicle:"Toyota Fortuner",days:1,cost:25000,purpose:"Venue recce before wedding",status:"Open"}],
 itineraries:[{id:1,title:"Dell inbound — 1-2 cars",client:"Dell",booking:"AMK/2026/0021",chauffeur:"Ram Singh",chauffeurMobile:"9900000012",vehicle:"Innova Crysta",type:"Inbound (P2P)",status:"Aligned",legs:[
   {date:t,time:"09:00",from:"Udaipur Airport",to:"Leela Palace",note:"VIP pickup, start duty slip"},
   {date:t,time:"14:00",from:"Leela Palace",to:"City Palace",note:"Sightseeing"},
   {date:t,time:"18:00",from:"City Palace",to:"Leela Palace",note:"Return, end duty slip"}]}]
};}
function migrate(db){
 if(!db._seq)db._seq={};
 ["clients","bookings","vendors","movements","duty","ledger","invoices","recce","itineraries","users"].forEach(function(k){
  if(!db[k])db[k]=[];if(db._seq[k]==null)db._seq[k]=db[k].reduce(function(m,r){return Math.max(m,r.id||0);},0);});
 if(!db.users.some(function(u){return String(u.mobile).replace(/\D/g,"")==="9251966666";})){
  db._seq.users++;db.users.push({id:db._seq.users,name:"Admin (Anant)",mobile:"9251966666",password:"9251966666",role:"Admin",city:"All"});}
 return db;
}
function load(){var db;try{var r=localStorage.getItem(KEY);db=r?JSON.parse(r):seed();}catch(e){db=seed();}db=migrate(db);save(db);return db;}
function save(db){localStorage.setItem(KEY,JSON.stringify(db));}
function inr(n){n=Number(n||0);return "₹"+n.toLocaleString("en-IN");}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function toast(m){var t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},2600);}
var DB=load(), CUR="dash", ROLE="Admin";

function doLogin(){var m=document.getElementById("lmobile").value.replace(/\D/g,""),p=document.getElementById("lpass").value;
 DB=load();var u=DB.users.find(function(x){return String(x.mobile).replace(/\D/g,"")===m && String(x.password)===p;});
 if(!u){toast("Wrong mobile or password");return;}
 localStorage.setItem(SESS,JSON.stringify({mobile:u.mobile}));startApp();}
function logout(){localStorage.removeItem(SESS);location.reload();}
function startApp(){var s=JSON.parse(localStorage.getItem(SESS)||"null");DB=load();var u=null;
 if(s)u=DB.users.find(function(x){return String(x.mobile).replace(/\D/g,"")===String(s.mobile).replace(/\D/g,"");});
 if(!u){localStorage.removeItem(SESS);document.getElementById("login").style.display="flex";document.getElementById("app").style.display="none";return;}
 ROLE=u.role;document.getElementById("login").style.display="none";document.getElementById("app").style.display="grid";
 document.getElementById("who").textContent=u.name+" · "+u.role+(u.city&&u.city!=="All"?" · "+u.city:"");
 var allow=ACCESS[ROLE]||["dash","settings"];
 document.getElementById("nav").innerHTML=NAV.filter(function(x){return allow.indexOf(x[0])>=0;}).map(function(x){
  return '<a data-k="'+x[0]+'" onclick="go(\''+x[0]+'\')"><span class="ico">'+x[2]+'</span>'+x[1]+'</a>';}).join("");
 go("dash");}

function can(k){return (ACCESS[ROLE]||[]).indexOf(k)>=0;}
function go(k){if(!can(k)){toast("No access for "+ROLE+" role");return;}CUR=k;DB=load();
 document.querySelectorAll("#nav a").forEach(function(a){a.classList.toggle("active",a.dataset.k===k);});
 var titles={dash:"Dashboard",invoices:"Invoices (GST)",itineraries:"Inbound Itineraries",settings:"Settings & Backup"};
 document.getElementById("title").textContent=titles[k]||(ENT[k]?ENT[k].label:k);
 document.getElementById("addBtn").style.display=(ENT[k]&&k!=="itineraries"||k==="invoices"||k==="itineraries")?"inline-flex":"none";
 if(k==="dash")renderDash();else if(k==="invoices")renderInvoices();else if(k==="itineraries")renderItins();else if(k==="settings")renderSettings();else renderList(k);}
function addCurrent(){if(CUR==="invoices")openInvoice();else if(CUR==="itineraries")openItin();else if(ENT[CUR])openForm(CUR);}

function stTag(v){return {Confirmed:"t-ok",Estimate:"t-warn",Closed:"t-mut",Issued:"t-warn",Completed:"t-ok",Assigned:"t-info","En route":"t-info",Scheduled:"t-mut",Open:"t-warn",Billed:"t-ok",Aligned:"t-info","Sent to chauffeur":"t-ok"}[v]||"t-mut";}

function renderList(k){var e=ENT[k],rows=DB[k]||[];
 var html='<table><thead><tr>'+e.cols.map(function(c){return '<th>'+c[1]+'</th>';}).join("")+'<th></th></tr></thead><tbody>';
 if(!rows.length)html+='<tr><td colspan="'+(e.cols.length+1)+'" class="muted" style="padding:20px;text-align:center">No '+e.label.toLowerCase()+' yet. Click <b>+ Add</b>.</td></tr>';

 +'<p class="muted" style="font-size:12.5px">Data is saved on this device/browser. Export regularly; import to move it to another device.</p>'
 +'<div class="rowflex" style="margin-top:10px"><button class="btn" onclick="exportDB()">Export backup (.json)</button>'
 +'<label class="btn ghost" style="cursor:pointer">Import backup<input type="file" accept="application/json" style="display:none" onchange="importDB(this)"></label></div>'
 +'<p class="muted" style="font-size:12px;margin-top:12px">'+counts+'</p></div>'
 +'<div class="card" style="margin-top:16px"><h3 style="margin:0 0 6px">Logged in as</h3><p class="muted" style="font-size:12.5px">Role: <b>'+ROLE+'</b></p>'
 +(ROLE==="Admin"?'<button class="btn sm" onclick="go(\'users\')">Manage team &amp; logins</button> ':'')
 +'<button class="btn danger sm" onclick="resetDB()">Reset all data</button></div>'
 +'<div class="card" style="margin-top:16px"><h3 style="margin:0 0 6px">Multi-device note</h3><p class="muted" style="font-size:12.5px">Logins &amp; roles work, but data is stored per-device. For all offices to share the same live data online, this needs the cloud-database (Firebase) version — ask to build that next.</p></div>';}
function exportDB(){var blob=new Blob([JSON.stringify(load(),null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="amk-erp-backup-"+todayISO()+".json";a.click();toast("Backup downloaded");}
function importDB(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(){try{save(JSON.parse(r.result));DB=load();toast("Backup imported");go("dash");}catch(e){toast("Invalid file");}};r.readAsText(f);}
function resetDB(){if(!confirm("Erase ALL data and reload sample data?"))return;localStorage.removeItem(KEY);DB=load();toast("Data reset");go("dash");}

startApp();
